<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ar-qr-tracer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  
  <script src="qr-generator.js"></script>

  <style>
    body, html { margin: 0; padding: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: black; }

    #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    video { width: 100%; height: 100%; object-fit: cover; }

    #qr-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      z-index: 2;
      touch-action: none;
      transform: translate(-50%, -50%);
      cursor: move;
    }
    #qr-image { width: 100%; height: 100%; object-fit: contain; }

    /* UI container */
    #ui-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease-in-out;
    }

    #ui-content {
      background: rgba(255,255,255,0.9);
      padding: 20px;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    }

    .ui-row { display: flex; gap: 10px; width: 100%; justify-content: center; align-items: center; }
    #qrText { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ccc; font-size: 16px; outline: none; }
  </style>
</head>
<body>
<div id="video-container">
  <video id="camera-stream" autoplay playsinline muted></video>
</div>

<div id="qr-overlay">
  <img id="qr-image" src="https://upload.wikimedia.org/wikipedia/commons/2/2f/QR_code_for_mobile_English_Wikipedia.png" alt="QR Code">
</div>

<div id="ui-container">
  <div id="ui-content">
    <div class="ui-row">
      <input type="text" id="qrText" placeholder="Enter text (max 17 chars)..." maxlength="17">
    </div>
    <div class="ui-row">
      <label>Opacity</label>
      <input type="range" id="opacitySlider" min="0" max="1" step="0.1" value="0.5">
    </div>
  </div>
</div>

<script>
  // Camera setup
  const video = document.getElementById('camera-stream');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => { video.srcObject = stream; })
    .catch(err => { console.error("Camera access error:", err); });

  // QR Overlay elements
  const qrOverlay = document.getElementById('qr-overlay');
  const qrImage = document.getElementById('qr-image');
  const qrText = document.getElementById('qrText');
  const opacitySlider = document.getElementById('opacitySlider');

  // Opacity
  opacitySlider.addEventListener('input', (e) => {
    qrImage.style.opacity = e.target.value;
  });
  qrImage.style.opacity = opacitySlider.value;

  // QR Generation
  qrText.addEventListener('input', (e) => {
    const text = e.target.value;
    if (!text) {
      qrImage.src = 'https://upload.wikimedia.org/wikipedia/commons/2/2f/QR_code_for_mobile_English_Wikipedia.png';
      return;
    }
    try {
      const canvas = QR.toCanvas(text, 20);
      qrImage.src = canvas.toDataURL();
    } catch (err) { console.error("QR Generation failed:", err); }
  });

  // Interaction: Drag and Pinch-to-scale
  let isDragging = false;
  let initialDistance = null;
  let initialScale = 1.0;
  let startX, startY;
  let initialLeft, initialTop;

  qrOverlay.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      const rect = qrOverlay.getBoundingClientRect();
      initialLeft = rect.left + rect.width / 2;
      initialTop = rect.top + rect.height / 2;
    } else if (e.touches.length === 2) {
      isDragging = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      initialDistance = Math.sqrt(dx * dx + dy * dy);
      initialScale = parseFloat(getComputedStyle(qrOverlay).width) / 200;
    }
  });

  qrOverlay.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      qrOverlay.style.left = (initialLeft + dx) + 'px';
      qrOverlay.style.top = (initialTop + dy) + 'px';
    } else if (e.touches.length === 2 && initialDistance) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const currentDistance = Math.sqrt(dx * dx + dy * dy);
      const scale = initialScale * (currentDistance / initialDistance);
      qrOverlay.style.width = (200 * scale) + 'px';
      qrOverlay.style.height = (200 * scale) + 'px';
    }
  }, { passive: false });

  qrOverlay.addEventListener('touchend', () => {
    isDragging = false;
    initialDistance = null;
  });
</script>
</body>
</html>
